<div class="container", style="">

  @for (lugar of this.lista; track $index; let indice = $index) {
    @if (lugar.activa){ 
      <span [class]="{'dot': lugar.jugador === 1, 'cross': lugar.jugador === 2}"></span>
    }
    @else { 
       <span class="filled" (click)="asignar(lugar)">?</span>
    }
    @if(indice % 3 === 2) { <br> }
  }
</div>
